<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KEEP IT UP!</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1>KEEP IT UP!</h1>
          <p>Mode Select + Phase 1 Foot Juggling</p>
          <div class="mode-select" role="group" aria-label="game mode select">
            <button type="button" class="mode-btn" data-mode="attack90">90s</button>
            <button type="button" class="mode-btn" data-mode="attack120">120s</button>
            <button type="button" class="mode-btn" data-mode="hardcore">Hardcore</button>
          </div>
        </div>
        <div class="hud">
          <div>Mode <strong id="mode">90s</strong></div>
          <div>Time <strong id="timer">90.0</strong></div>
          <div>Score <strong id="score">0</strong></div>
          <div>Combo <strong id="combo">0</strong></div>
          <div>Status <strong id="status">Ready</strong></div>
        </div>
      </header>

      <canvas id="game" width="960" height="540" aria-label="KEEP IT UP game canvas"></canvas>

      <section class="controls-help">
        <p>Move: Arrow Left / Arrow Right</p>
        <p>Kick: A = left foot, D = right foot</p>
        <p>Mode: 1 = 90s, 2 = 120s, 3 = Hardcore</p>
        <p>Start / Restart: Space</p>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
